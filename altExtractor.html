<!DOCTYPE html>
<html>
    <!-- ideas for improvement
        1. check if fist word is 'the ' as in 'the following may be requested'
        2. delete period at end of sentence
        3. delete numbers and decimals
    -->
<head>
    <title>Alt Extractor</title>
    <link rel="shortcut icon" type="x-icon" href="favicon.ico">
    <script>
        // Extract button
        function getAlternatives() {
            // Clear the div of previous values
            document.getElementById('superDiv').innerText = '';     

            // Get the snippet
            let text = document.getElementById('textInput').value; 
            
            // Split snippet by paragraph
            let parsedByLine = text.split(/\r?\n/);   
            
            // Save only the first paragraph
            let firstLine = parsedByLine[0];      
            
            // Split first paragraph at the colon
            let parsedByColon = firstLine.split(":");

            // Error if there is no colon
            if(parsedByColon.length === 1) {
                document.getElementById('superDiv').innerText = "Error: Entry is blank or there is no colon in the first paragraph; please edit entry.";
            }
            
            // From the first paragraph, save everything after the first colon
            let afterColon = parsedByColon.slice(1);
            
            // If there were multiple colons (i.e. multiple arrays), create one string.
            let afterColonJoined = afterColon.join(' , ');
            
            // Split up drug names by commas
            let drugList = afterColonJoined.split(",");  
            
            // Defined for future use
            let allDrugs = [];
            let allDrugsNoNumbers = [];
            
            // How to handle 'and'
            for(i = 0; i < drugList.length; i++) {
                // If the word and is present, split up the element (also removes 'and'). Creates an array.             
                let newDrugsList = drugList[i].split(" and ");
                
                // Create a new drug list of items (no array within an array problem). Works if there are one or two elements in newDrugsList.
                for(k = 0; k < newDrugsList.length; k++) {
                    allDrugs.push(newDrugsList[k]);
                };
            }

            // Polish on items and the array
            for(i=0; i < allDrugs.length; i++) {

                // Remove spaces at beginning/end of each item
                allDrugs[i] = allDrugs[i].trim();
                
                // Handling blank entries
                if(allDrugs[i] === '') {

                    // Remove item from array
                    allDrugs.splice(i, 1);

                    //Reset i, otherwise would skip an item
                    i--;
                }
                
                // Capitalize each item
                allDrugs[i] = allDrugs[i].charAt(0).toUpperCase() + allDrugs[i].slice(1); 

                // Remove period at end of item
                if(allDrugs[i].endsWith('.')) {
                    allDrugs[i] = allDrugs[i].slice(0, -1);
                }

            };

            // Check for items that are numbers only, add them to previous item in array.
            for(i = 0; i < allDrugs.length; i++) {

                // regex expression is / ... /, ^ first element, \d is digit (0-9)
                if(/^\d/.test(allDrugs[i])) {
                    let previousElement = i-1

                    // Combine elements. 
                        // Example, if i is index 5 (10 mg), previousElement would be index 4 (glipizide 2.5 mg). 
                        // splice will add a new element at index 4 (glipizide 2.5 mg, 10 mg), pushing contents of previousElement (glipizide 2.5 mg) to index 5, and i (10 mg) to 6.
                        // splice will then delete the 2 elements after index 4 (glipizide 2.5 mg, and 10 mg), with combined product remaining.
                    allDrugs.splice(

                        // Add new element before the previous entry 
                        previousElement, 

                        // Delete the previous entry and the current entry
                        2, 

                        // Create new element that combines previous entry and current entry
                        allDrugs[previousElement] + ", " + allDrugs[i]);

                    // Reset i, otherwise will skip an item
                    i--;
                }
            }
            
            // Sort alphabetically
            let drugListSorted = allDrugs.sort();     
        

             // For loop to add each drug to the page
            for(i = 0; i < allDrugs.length; i++) {     
                // Create checkbox    
                let check = document.createElement('input');
                check.type = 'checkbox';

                // Text for checkbox (i.e. drug name)
                let drugNode = document.createTextNode(allDrugs[i]);
                
                // Add checkbox and text to the label
                let newLabel = document.createElement('label');              
                    newLabel.appendChild(check);
                    newLabel.appendChild(drugNode);
                    
                let outputDiv = document.getElementById('superDiv');
                // Add spacing between lines    
                    outputDiv.classList.add('line-spacing');   
                    
                // Add drug name to the div
                    outputDiv.appendChild(newLabel);

                // Add new line (break) after drug name
                    let bk = document.createElement('br');
                    outputDiv.appendChild(bk);          
            };

        }

        // Clear button: Clears textarea input and the output, brings focus to the textarea.
        function clearTextarea() {
            document.getElementById('textInput').value = '';
            document.getElementById('superDiv').innerText = '';
            document.getElementById('textInput').focus();
        }
    </script>
    <style>
        body, textarea {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-image: linear-gradient(#b46848, #efba5c);
            background-repeat: no-repeat;
            min-height: 100vh;
            padding-left: 30px;
            padding-right: 30px;
        }

        h4 {
            margin-bottom: 0px;
        }

        p {
            line-height: 1.4;
        }

        .line-spacing {
            line-height: 1.4;
        }

        ol li {
            margin-bottom: 2px;
        }

        textarea {
            field-sizing: content; /* height of the textarea will automatically increase based on the number of lines entered. */
            min-height: 6rem; /* default number of lines to start with */
            max-width: 600px;
            background-color: #ffffffe3;
            box-shadow: 2px 2px 4px #17223058 inset;
            border-color: black;
            padding: 5px;
            border-radius: 5px;
        }

        input[type=checkbox] {
            accent-color: #0077ff;
        }

        button {
            background-image: linear-gradient(#efba5cc6, #d99b55c6);
            box-shadow: 0px 2px 4px #17223098;
            padding: 5px;
            border: 1px solid;
            border-radius: 5px;
            width: 75px;
            margin-right: 5px;
            transition: all 0.1s ease-out;
        }

        button:hover {
            background-color: red;
            box-shadow: 0px 6px 4px #17223098;
            transform: translateY(-4px);
        }

        button:active {
            background-color: yellow;
            box-shadow: 0px 0px 4px #17223098;
            transform: translateY(4px);
        }

        .page-wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }

        .content-background {
            background-color: #faf7f5e4;
            box-shadow: 6px 6px 18px #17223098;
            padding-top: 10px;
            padding-left: 40px;
            padding-right: 40px;
            padding-bottom: 40px;
            border-radius: 40px;
        }

        .flex-box {
            display: flex;
            padding-left: 20px;
            align-items: center;
        }

        .heading-box {
            background-image: linear-gradient(#d99b55c6, #efba5c);
            box-shadow: 0px 2px 4px #17223098;
            border-radius: 20px;
            min-height: 100px;
            padding: 3px 20px 10px 20px;
            margin-top: 20px;
        }

        .return-box {
            background-color: #ffffffe3;
            box-shadow: 0px 2px 4px #17223098;
            border-radius: 20px;
            min-height: 100px;
            padding: 3px 20px 20px 20px;
        }


    </style>
</head>
<body>
    <div class="body-background">
        <div class="page-wrapper content-background">
            <div>
                <div id="heading" class="heading-box">
                    <H2>Alt Extractor</H2>
                    <p>Returns a list of alternatives from a snippet for non-formulary medications.</p>
                </div>

                <div id="inputAndRequirements" >


                    <div>
                        <H4>Requirements:</H4>
                        <ol>
                            <li>All alternatives must be in the first paragraph.</li>
                            <li>Alternatives must be listed after at least one colon. </li>
                        </ol>
                        
                    </div>

                    <div>
                        <textarea
                            id="textInput"
                            placeholder="paste TextExpander snippet here, then click Extract"
                            cols='100';
                            rows='20';
                            ></textarea>
                        <br>
                        <br>
                        <button type="button" onclick="getAlternatives()">Extract</button>
                        <button type="button" onclick="clearTextarea()">Clear</button>
                    </div>
                    
                    

                    
                </div>
            </div>
            <br>

            <div class="return-box">
                <p>List returns here:</p>
                <div id="superDiv" class="return-div" style="padding-left: 20px;">
                </div>
            </div>
        </div>
    </div>
</body>
